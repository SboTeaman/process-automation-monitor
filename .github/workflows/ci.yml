name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  orchestrator:
    name: Orchestrator (Java)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: process-automation-monitor/orchestrator-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn -B verify --no-transfer-progress

  worker:
    name: Worker service (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: process-automation-monitor/worker-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: process-automation-monitor/worker-service/requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install ruff black pytest pytest-asyncio
      - run: ruff check app tests
      - run: black --check app tests
      - run: pytest -q

  analytics:
    name: Analytics service (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: process-automation-monitor/analytics-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: process-automation-monitor/analytics-service/requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install ruff black pytest pytest-asyncio
      - run: ruff check app tests
      - run: black --check app tests
      - run: pytest -q

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm run build
