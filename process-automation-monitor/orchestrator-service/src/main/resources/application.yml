server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/processmonitor?sslmode=${DB_SSL_MODE:require}&sslcert=${DB_SSL_CERT:}&sslkey=${DB_SSL_KEY:}&sslrootcert=${DB_SSL_ROOT_CERT:}}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  quartz:
    job-store-type: memory
    properties:
      org:
        quartz:
          threadPool:
            threadCount: 10
          scheduler:
            instanceName: ProcessMonitorScheduler

  web:
    cors:
      allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-min-256-bits-long-key}
    access-token-expiry: ${JWT_ACCESS_EXPIRY:900000}
    refresh-token-expiry: ${JWT_REFRESH_EXPIRY:604800000}

  worker:
    base-url: ${WORKER_SERVICE_URL:http://localhost:8000}
    api-key: ${WORKER_API_KEY}

  analytics:
    api-key: ${ANALYTICS_API_KEY}

  security:
    # Comma-separated list of trusted reverse-proxy IPs for X-Forwarded-For.
    # Leave empty when running without a proxy (default: empty = always use direct TCP IP).
    trusted-proxies: ${TRUSTED_PROXIES:}

  retention:
    days: 90

logging:
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
  level:
    root: INFO
    com.processmonitor: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG

swagger:
  enabled: ${SWAGGER_ENABLED:false}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:false}
