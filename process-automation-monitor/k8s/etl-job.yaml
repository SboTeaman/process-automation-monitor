# ETL CronJob — aggregates execution data from PostgreSQL (orchestrator)
# into MySQL (analytics) every hour.
# Populates: daily_stats, job_performance tables.

apiVersion: batch/v1
kind: CronJob
metadata:
  name: etl-job
  namespace: default
  labels:
    app: etl-job
    component: analytics
spec:
  schedule: "0 * * * *"   # every hour, on the hour
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        metadata:
          labels:
            app: etl-job
        spec:
          restartPolicy: OnFailure
          containers:
            - name: etl-job
              image: process-monitor/analytics-service:latest
              imagePullPolicy: IfNotPresent
              command: ["python", "-m", "app.etl.etl_job"]
              env:
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: process-monitor-secrets
                      key: postgres-password
                - name: MYSQL_ANALYTICS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: process-monitor-secrets
                      key: mysql-analytics-password
                - name: ORCHESTRATOR_DB_URL
                  value: postgresql://orchestrator:$(POSTGRES_PASSWORD)@postgres:5432/orchestrator_db
                - name: ANALYTICS_DB_URL
                  value: mysql+pymysql://analytics:$(MYSQL_ANALYTICS_PASSWORD)@mysql-analytics:3306/analytics_db
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"

