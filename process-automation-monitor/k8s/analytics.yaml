apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-config
  namespace: default
data:
  ANALYTICS_DB_URL: "mysql+pymysql://analytics:$(MYSQL_ANALYTICS_PASSWORD)@mysql-analytics:3306/analytics_db"
  ORCHESTRATOR_DB_URL: "postgresql://orchestrator:$(POSTGRES_PASSWORD)@postgres:5432/orchestrator_db"
  SERVICE_NAME: "analytics-service"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: default
  labels:
    app: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: process-monitor/analytics-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: MYSQL_ANALYTICS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: process-monitor-secrets
                  key: mysql-analytics-password
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: process-monitor-secrets
                  key: postgres-password
            - name: ANALYTICS_DB_URL
              value: mysql+pymysql://analytics:$(MYSQL_ANALYTICS_PASSWORD)@mysql-analytics:3306/analytics_db
            - name: ORCHESTRATOR_DB_URL
              value: postgresql://orchestrator:$(POSTGRES_PASSWORD)@postgres:5432/orchestrator_db
            - name: SERVICE_NAME
              value: analytics-service
          resources:
            requests:
              memory: "256Mi"
              cpu: "128m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: default
spec:
  selector:
    app: analytics-service
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
