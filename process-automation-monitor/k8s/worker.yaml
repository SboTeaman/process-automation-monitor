apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
  namespace: default
  labels:
    app: worker-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-service
  template:
    metadata:
      labels:
        app: worker-service
    spec:
      containers:
        - name: worker-service
          image: process-monitor/worker-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: mysql+pymysql://worker:$(MYSQL_PASSWORD)@mysql:3306/worker_db
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: process-monitor-secrets
                  key: mysql-password
            - name: SERVICE_NAME
              value: worker-service
          resources:
            requests:
              memory: "256Mi"
              cpu: "128m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: worker-service
  namespace: default
spec:
  selector:
    app: worker-service
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
