apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator-service
  namespace: default
  labels:
    app: orchestrator-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator-service
  template:
    metadata:
      labels:
        app: orchestrator-service
    spec:
      containers:
        - name: orchestrator-service
          image: process-monitor/orchestrator-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/orchestrator_db
            - name: SPRING_DATASOURCE_USERNAME
              value: orchestrator
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: process-monitor-secrets
                  key: postgres-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: process-monitor-secrets
                  key: jwt-secret
            - name: JWT_EXPIRY_MINUTES
              value: "15"
            - name: JWT_REFRESH_EXPIRY_DAYS
              value: "7"
            - name: WORKER_SERVICE_URL
              value: http://worker-service:8000
            - name: ALLOWED_ORIGINS
              value: "http://localhost:3000"
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: process-monitor-secrets
                  key: mail-password
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator-service
  namespace: default
spec:
  selector:
    app: orchestrator-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
